services:
  postgres:
    # Enterprise: enable pg_tde and use Vault as the KMS provider.
    environment:
      LAW_EYE_PG_TDE_PROVIDER: "vault"
      LAW_EYE_PG_TDE_VAULT_ADDR: "https://vault:8200"
      LAW_EYE_PG_TDE_VAULT_MOUNT: "tde/data/global-key"
      LAW_EYE_PG_TDE_VAULT_TOKEN_FILE: "/etc/law-eye/pg_tde_token"
      LAW_EYE_PG_TDE_VAULT_CA: "/etc/vault/ca.crt"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${LAW_EYE_ENTERPRISE_SECRETS_DIR:?missing LAW_EYE_ENTERPRISE_SECRETS_DIR}/vault_pg_tde_token:/etc/law-eye/pg_tde_token:ro
      - ${LAW_EYE_ENTERPRISE_PKI_DIR:?missing LAW_EYE_ENTERPRISE_PKI_DIR}/ca.crt:/etc/vault/ca.crt:ro
    depends_on:
      vault:
        condition: service_started

  vault:
    image: ${VAULT_IMAGE:-hashicorp/vault:1.15.6@sha256:0450896c43b13879b19442b204ce29dd19b5a10fce43d5cf38af17da20f56f4d}
    container_name: law-eye-vault
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    volumes:
      - ./infra/vault/vault-config.hcl:/vault/config/vault.hcl:ro
      - ${LAW_EYE_ENTERPRISE_PKI_DIR:?missing LAW_EYE_ENTERPRISE_PKI_DIR}:/vault/tls:ro
      - vault_data:/vault/file
    networks:
      - backend
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE:-alpine/minio:RELEASE.2025-10-15T17-29-55Z@sha256:cf23643a6cf9ce159c57643ceb88279e431262282428c9e0bf3a7ef1a97e84b4}
    container_name: law-eye-minio
    user: "1000:1000"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    restart: unless-stopped

  api:
    # Enterprise mode: do not expose the API directly to the host.
    ports: []
    environment:
      PRODUCTION: "1"
      # Sensitive config is loaded from Vault at startup (no plaintext DB/AI secrets in compose env).
      LAW_EYE__SECRETS__VAULT__ENABLED: "true"
      LAW_EYE__SECRETS__VAULT__ADDR: "https://vault:8200"
      LAW_EYE__SECRETS__VAULT__KV_PATH: "secret/law-eye/api"
      LAW_EYE__SECRETS__VAULT__CA_CERT_PATH: "/etc/vault/pki/ca.crt"
      LAW_EYE__SECRETS__VAULT__CLIENT_CERT_PATH: "/etc/vault/pki/vault-api-client.crt"
      LAW_EYE__SECRETS__VAULT__CLIENT_KEY_PATH: "/etc/vault/pki/vault-api-client.key"
      LAW_EYE__DATABASE__SESSION_ROLE: "law_eye_app"
      LAW_EYE__ENCRYPTION__FEEDBACKS__ENABLED: "true"
      LAW_EYE__OBJECT_STORAGE__ENABLED: "true"
      LAW_EYE__OBJECT_STORAGE__ENDPOINT: "http://minio:9000"
      LAW_EYE__OBJECT_STORAGE__REGION: "us-east-1"
      LAW_EYE__OBJECT_STORAGE__BUCKET: "law-eye"
      LAW_EYE__OBJECT_STORAGE__ACCESS_KEY_ID: ""
      LAW_EYE__OBJECT_STORAGE__SECRET_ACCESS_KEY: ""
      LAW_EYE__OBJECT_STORAGE__FORCE_PATH_STYLE: "true"
      # Clear plaintext secrets inherited from the default compose.
      LAW_EYE__DATABASE__URL: ""
      LAW_EYE__REDIS__URL: ""
      LAW_EYE__AI__API_KEY: ""
      LAW_EYE__AI__BASE_URL: ""
      LAW_EYE__METRICS__TOKEN: ${LAW_EYE__METRICS__TOKEN:?LAW_EYE__METRICS__TOKEN is required}
    depends_on:
      vault:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ${LAW_EYE_ENTERPRISE_PKI_DIR:?missing LAW_EYE_ENTERPRISE_PKI_DIR}:/etc/vault/pki:ro

  worker:
    environment:
      PRODUCTION: "1"
      LAW_EYE__SECRETS__VAULT__ENABLED: "true"
      LAW_EYE__SECRETS__VAULT__ADDR: "https://vault:8200"
      LAW_EYE__SECRETS__VAULT__KV_PATH: "secret/law-eye/worker"
      LAW_EYE__SECRETS__VAULT__CA_CERT_PATH: "/etc/vault/pki/ca.crt"
      LAW_EYE__SECRETS__VAULT__CLIENT_CERT_PATH: "/etc/vault/pki/vault-worker-client.crt"
      LAW_EYE__SECRETS__VAULT__CLIENT_KEY_PATH: "/etc/vault/pki/vault-worker-client.key"
      LAW_EYE__DATABASE__SESSION_ROLE: "law_eye_app"
      LAW_EYE__ENCRYPTION__FEEDBACKS__ENABLED: "true"
      LAW_EYE__OBJECT_STORAGE__ENABLED: "true"
      LAW_EYE__OBJECT_STORAGE__ENDPOINT: "http://minio:9000"
      LAW_EYE__OBJECT_STORAGE__REGION: "us-east-1"
      LAW_EYE__OBJECT_STORAGE__BUCKET: "law-eye"
      LAW_EYE__OBJECT_STORAGE__ACCESS_KEY_ID: ""
      LAW_EYE__OBJECT_STORAGE__SECRET_ACCESS_KEY: ""
      LAW_EYE__OBJECT_STORAGE__FORCE_PATH_STYLE: "true"
      LAW_EYE__DATABASE__URL: ""
      LAW_EYE__REDIS__URL: ""
      LAW_EYE__AI__API_KEY: ""
      LAW_EYE__AI__BASE_URL: ""
      LAW_EYE__METRICS__TOKEN: ${LAW_EYE__METRICS__TOKEN:?LAW_EYE__METRICS__TOKEN is required}
    depends_on:
      vault:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ${LAW_EYE_ENTERPRISE_PKI_DIR:?missing LAW_EYE_ENTERPRISE_PKI_DIR}:/etc/vault/pki:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: law-eye-web
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  api-mtls:
    image: ${CADDY_IMAGE:-caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17}
    container_name: law-eye-api-mtls
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./infra/caddy/Caddyfile.api-mtls:/etc/caddy/Caddyfile:ro
      - ${LAW_EYE_ENTERPRISE_PKI_DIR:?missing LAW_EYE_ENTERPRISE_PKI_DIR}:/etc/caddy/pki:ro
      - caddy_api_mtls_data:/data
      - caddy_api_mtls_config:/config
    networks:
      - backend
    restart: unless-stopped

  gateway:
    image: ${CADDY_IMAGE:-caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17}
    container_name: law-eye-gateway
    depends_on:
      - web
      - api-mtls
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${LAW_EYE_ENTERPRISE_PKI_DIR:?missing LAW_EYE_ENTERPRISE_PKI_DIR}:/etc/caddy/pki:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend
    restart: unless-stopped

  blackbox-exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE:-prom/blackbox-exporter:v0.25.0}
    container_name: law-eye-blackbox-exporter
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    volumes:
      - ./infra/monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - backend
    restart: unless-stopped

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:v0.27.0}
    container_name: law-eye-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - backend
    restart: unless-stopped

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.54.1}
    container_name: law-eye-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    environment:
      LAW_EYE__METRICS__TOKEN: ${LAW_EYE__METRICS__TOKEN:?LAW_EYE__METRICS__TOKEN is required}
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro
      - ${LAW_EYE_ENTERPRISE_SECRETS_DIR:?missing LAW_EYE_ENTERPRISE_SECRETS_DIR}/metrics_token:/etc/prometheus/secrets/metrics_token:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
      alertmanager:
        condition: service_started
      blackbox-exporter:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped


  vault-rotate-cron:
    image: ${VAULT_IMAGE:-hashicorp/vault:1.15.6@sha256:0450896c43b13879b19442b204ce29dd19b5a10fce43d5cf38af17da20f56f4d}
    container_name: law-eye-vault-rotate-cron
    entrypoint: ["/bin/sh", "/scripts/enterprise/vault-rotate-cron.sh"]
    environment:
      LAW_EYE_VAULT_ROTATE_INTERVAL_SECONDS: ${LAW_EYE_VAULT_ROTATE_INTERVAL_SECONDS:-2592000}
      VAULT_ADDR: "https://vault:8200"
      VAULT_CACERT: "/etc/vault/pki/ca.crt"
      VAULT_CLIENT_CERT: "/etc/vault/pki/vault-api-client.crt"
      VAULT_CLIENT_KEY: "/etc/vault/pki/vault-api-client.key"
    volumes:
      - ./scripts/enterprise:/scripts/enterprise:ro
      - ${LAW_EYE_ENTERPRISE_PKI_DIR:?missing LAW_EYE_ENTERPRISE_PKI_DIR}:/etc/vault/pki:ro
    depends_on:
      vault:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped

  backup-cron:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: law-eye-backup-cron
    entrypoint: ["/bin/sh", "-c", "while true; do /scripts/enterprise/backup-encrypted.sh; sleep ${LAW_EYE_BACKUP_INTERVAL_SECONDS:-86400}; done"]
    environment:
      LAW_EYE__DATABASE__URL: ${LAW_EYE__DATABASE__URL:?LAW_EYE__DATABASE__URL is required}
      LAW_EYE_BACKUP_PASSPHRASE: ${LAW_EYE_BACKUP_PASSPHRASE:?LAW_EYE_BACKUP_PASSPHRASE is required}
      LAW_EYE_BACKUP_DIR: /var/backups/law-eye
      LAW_EYE_BACKUP_RETENTION_DAYS: ${LAW_EYE_BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./scripts/enterprise:/scripts/enterprise:ro
      - backup_data:/var/backups/law-eye
    depends_on:
      postgres:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped

  audit-report-cron:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: law-eye-audit-report-cron
    entrypoint: ["/bin/sh", "-c", "while true; do /scripts/enterprise/audit-report.sh; sleep ${LAW_EYE_AUDIT_REPORT_INTERVAL_SECONDS:-604800}; done"]
    environment:
      LAW_EYE__DATABASE__URL: ${LAW_EYE__DATABASE__URL:?LAW_EYE__DATABASE__URL is required}
      LAW_EYE_AUDIT_REPORT_DIR: /var/reports/law-eye
      LAW_EYE_AUDIT_REPORT_RETENTION_DAYS: ${LAW_EYE_AUDIT_REPORT_RETENTION_DAYS:-90}
      LAW_EYE_AUDIT_LOG_RETENTION_DAYS: ${LAW_EYE_AUDIT_LOG_RETENTION_DAYS:-365}
    volumes:
      - ./scripts/enterprise:/scripts/enterprise:ro
      - audit_report_data:/var/reports/law-eye
    depends_on:
      postgres:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  caddy_api_mtls_data:
  caddy_api_mtls_config:
  vault_data:
  minio_data:
  backup_data:
  audit_report_data:
  alertmanager_data:
  prometheus_data:
