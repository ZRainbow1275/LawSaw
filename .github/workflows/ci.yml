name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@v3.91.2
        with:
          extra_args: --log-level=2 --results=verified,unknown

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format (rustfmt)
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features --locked

      - name: Install coverage tool (cargo-tarpaulin)
        run: cargo install cargo-tarpaulin --locked

      - name: Coverage (tarpaulin)
        run: cargo tarpaulin --workspace --all-features --locked --out Lcov --output-dir target/tarpaulin --root .

      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: target/tarpaulin
          if-no-files-found: ignore

      - name: Security audit (RustSec)
        uses: actions-rust-lang/audit@v1
        with:
          createIssues: false

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint + format check (Biome)
        run: pnpm exec biome check src

      - name: Coverage (Istanbul)
        run: pnpm coverage

      - name: Upload Web coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage
          if-no-files-found: ignore

      - name: Security audit (pnpm audit)
        run: pnpm audit --audit-level high

      - name: Build
        run: pnpm build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install Web deps
        run: pnpm -C apps/web install --frozen-lockfile

      - name: Install Playwright (Chromium)
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run E2E (no-dockerhub stack)
        run: bash scripts/no-dockerhub/e2e.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test-results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          if-no-files-found: ignore

      - name: Upload stack logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-stack-logs
          path: tmp/no-dockerhub
          if-no-files-found: ignore

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom.spdx.json
          path: sbom.spdx.json
