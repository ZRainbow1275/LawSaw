name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@v3.91.2
        with:
          extra_args: --log-level=2 --results=verified,unknown

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format (rustfmt)
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Complexity check (clippy cognitive complexity)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -A warnings -W clippy::cognitive_complexity

      - name: Test
        run: cargo test --workspace --all-features --locked

      - name: Contract (OpenAPI spec drift)
        run: |
          cargo run -p law-eye-api --locked -- --dump-openapi > /tmp/openapi.v1.json
          diff -u resource/openapi.v1.json /tmp/openapi.v1.json

      - name: Install coverage tool (cargo-tarpaulin)
        run: cargo install cargo-tarpaulin --locked

      - name: Coverage (tarpaulin)
        run: cargo tarpaulin --workspace --all-features --locked --out Lcov --output-dir target/tarpaulin --root .

      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: target/tarpaulin
          if-no-files-found: ignore

      - name: Security audit (RustSec)
        uses: actions-rust-lang/audit@v1
        with:
          createIssues: false

  dependency-policy:
    name: Dependency Policy (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Resolve dependency graph (cycle guard)
        run: cargo metadata --locked --all-features > /dev/null

      - name: Dependency policy check (cargo-deny)
        run: cargo deny check --all-features bans sources advisories

  container-security:
    name: Container Security (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t law-eye-api:ci .

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: law-eye-api:ci
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Contract (OpenAPI -> TypeScript)
        run: pnpm gen:api-types

      - name: Contract (generated API types drift)
        run: git diff --exit-code -- src/lib/api/generated/openapi.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: i18n coverage (zh-strict)
        run: pnpm check:i18n

      - name: Lint + format check (Biome)
        run: pnpm exec biome check src

      - name: Coverage (Istanbul)
        run: pnpm coverage

      - name: Upload Web coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage
          if-no-files-found: ignore

      - name: Security audit (pnpm audit script)
        run: pnpm run audit

      - name: Build
        run: pnpm build

      - name: Bundle-size budget
        env:
          BUDGET_MAIN_KB: "500"
          BUDGET_ROUTE_KB: "300"
        run: node scripts/check-bundle-budget.mjs

      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-next-build
          path: |
            apps/web/.next
            !apps/web/.next/cache
          if-no-files-found: error
          retention-days: 1

  web-smoke:
    name: Web Smoke (Playwright)
    runs-on: ubuntu-latest
    needs: web
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Download Next.js build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-next-build
          path: apps/web/.next

      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Next.js (background)
        env:
          PORT: "3000"
          NODE_ENV: production
        run: |
          pnpm start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid

      - name: Wait for http://localhost:3000/
        run: |
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:3000/; then
              echo "Next.js is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Next.js did not become ready; dumping log:"
          cat /tmp/next-start.log || true
          exit 1

      - name: Run smoke tests
        env:
          E2E_BASE_URL: http://localhost:3000
        run: pnpm exec playwright test --grep @smoke

      - name: Stop Next.js
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill "$(cat /tmp/next-start.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright smoke report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Upload Next.js server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-next-log
          path: /tmp/next-start.log
          if-no-files-found: ignore

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install Web deps
        run: pnpm -C apps/web install --frozen-lockfile

      - name: Install Playwright (Chromium)
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run E2E (no-dockerhub stack)
        run: bash scripts/no-dockerhub/e2e.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test-results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          if-no-files-found: ignore

      - name: Upload stack logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-stack-logs
          path: tmp/no-dockerhub
          if-no-files-found: ignore

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom.spdx.json
          path: sbom.spdx.json
