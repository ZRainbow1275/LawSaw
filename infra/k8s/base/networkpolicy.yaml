apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: law-eye-api-ingress-allowlist
  labels:
    app: law-eye-api
spec:
  podSelector:
    matchLabels:
      app: law-eye-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: law-eye
      ports:
        - protocol: TCP
          port: 3001
