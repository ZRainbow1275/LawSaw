apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: law-eye-api-public
  labels:
    app: law-eye-api
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/private-key-rotation-policy: Always
    cert-manager.io/renew-before: 168h
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: TLSv1.2 TLSv1.3
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - law-eye.example.com
      secretName: law-eye-public-tls
  rules:
    - host: law-eye.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: law-eye-api
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: law-eye-api-internal
  labels:
    app: law-eye-api
  annotations:
    cert-manager.io/cluster-issuer: law-eye-internal-ca-issuer
    cert-manager.io/private-key-rotation-policy: Always
    cert-manager.io/renew-before: 168h
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: TLSv1.2 TLSv1.3
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-secret: __LAW_EYE_NAMESPACE__/law-eye-client-ca
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "2"
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - law-eye-internal.example.com
      secretName: law-eye-internal-tls
  rules:
    - host: law-eye-internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: law-eye-api
                port:
                  number: 80
