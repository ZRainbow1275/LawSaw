services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: law-eye-postgres
    environment:
      POSTGRES_DB: law_eye
      POSTGRES_USER: law_eye
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_eye"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-eye-network

  redis:
    image: redis:7-alpine
    container_name: law-eye-redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-eye-network

  minio:
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: law-eye-minio
    user: "0:0"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - law-eye-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: law-eye-api
    environment:
      # 使用 LAW_EYE__ 前缀匹配 config.rs 中的环境变量解析
      LAW_EYE__SERVER__HOST: "0.0.0.0"
      LAW_EYE__SERVER__PORT: "3001"
      LAW_EYE__DATABASE__URL: postgres://law_eye:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/law_eye
      LAW_EYE__DATABASE__MAX_CONNECTIONS: "10"
      LAW_EYE__DATABASE__SESSION_ROLE: "law_eye_app"
      LAW_EYE__REDIS__URL: redis://redis:6379
      LAW_EYE__AI__API_KEY: ${OPENAI_API_KEY:-}
      LAW_EYE__AI__BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LAW_EYE__AI__MODEL: gpt-4o-mini
      LAW_EYE__AI__EMBEDDING_MODEL: text-embedding-3-small
      LAW_EYE__OBJECT_STORAGE__ENABLED: "true"
      LAW_EYE__OBJECT_STORAGE__ENDPOINT: "http://minio:9000"
      LAW_EYE__OBJECT_STORAGE__REGION: "us-east-1"
      LAW_EYE__OBJECT_STORAGE__BUCKET: "law-eye"
      LAW_EYE__OBJECT_STORAGE__ACCESS_KEY_ID: "minioadmin"
      LAW_EYE__OBJECT_STORAGE__SECRET_ACCESS_KEY: "minioadmin"
      LAW_EYE__OBJECT_STORAGE__FORCE_PATH_STYLE: "true"
      RUST_LOG: info
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - law-eye-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: law-eye-worker
    environment:
      LAW_EYE__SERVER__HOST: "0.0.0.0"
      LAW_EYE__SERVER__PORT: "3002"
      LAW_EYE__DATABASE__URL: postgres://law_eye:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/law_eye
      LAW_EYE__DATABASE__MAX_CONNECTIONS: "10"
      LAW_EYE__DATABASE__SESSION_ROLE: "law_eye_app"
      LAW_EYE__REDIS__URL: redis://redis:6379
      LAW_EYE__AI__API_KEY: ${OPENAI_API_KEY:-}
      LAW_EYE__AI__BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LAW_EYE__AI__MODEL: gpt-4o-mini
      LAW_EYE__AI__EMBEDDING_MODEL: text-embedding-3-small
      LAW_EYE__OBJECT_STORAGE__ENABLED: "true"
      LAW_EYE__OBJECT_STORAGE__ENDPOINT: "http://minio:9000"
      LAW_EYE__OBJECT_STORAGE__REGION: "us-east-1"
      LAW_EYE__OBJECT_STORAGE__BUCKET: "law-eye"
      LAW_EYE__OBJECT_STORAGE__ACCESS_KEY_ID: "minioadmin"
      LAW_EYE__OBJECT_STORAGE__SECRET_ACCESS_KEY: "minioadmin"
      LAW_EYE__OBJECT_STORAGE__FORCE_PATH_STYLE: "true"
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - law-eye-network
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: law-eye-n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - LAW_EYE_API_URL=http://api:3001
      - EMAIL_FROM=${EMAIL_FROM:-noreply@laweye.com}
      - EMAIL_TO=${EMAIL_TO:-}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    depends_on:
      - api
    networks:
      - law-eye-network
    restart: unless-stopped

networks:
  law-eye-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  minio_data:
