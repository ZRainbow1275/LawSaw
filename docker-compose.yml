services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres-pgvector
    image: lawsaw-postgres-pgvector:local
    user: "postgres"
    environment:
      POSTGRES_DB: law_eye
      POSTGRES_USER: law_eye
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      ENABLE_PG_TDE: "1"
      # Ensure SCRAM for both local/host connections (enterprise-grade defaults).
      POSTGRES_INITDB_ARGS: "--auth=scram-sha-256 --auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_eye"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-eye-network
    restart: unless-stopped

  postgres-init:
    image: lawsaw-postgres-pgvector:local
    user: "0:0"
    entrypoint: ["bash", "-lc"]
    command: "chown postgres:postgres /var/lib/postgresql/data"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    restart: "no"

  redis-init:
    image: alpine:3.20@sha256:a4f4213abb84c497377b8544c81b3564f313746700372ec4fe84653e4fb03805
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /data/appendonlydir && chown 1000:1000 /data /data/appendonlydir"]
    volumes:
      - redis_data:/data
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    restart: "no"

  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    image: lawsaw-redis:local
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    depends_on:
      redis-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-eye-network
    restart: unless-stopped

  minio-init:
    image: alpine:3.20@sha256:a4f4213abb84c497377b8544c81b3564f313746700372ec4fe84653e4fb03805
    user: "0:0"
    command: ["sh", "-c", "chown 1000:1000 /data"]
    volumes:
      - minio_data:/data
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    restart: "no"

  minio:
    image: ${MINIO_IMAGE:-alpine/minio:RELEASE.2025-10-15T17-29-55Z@sha256:cf23643a6cf9ce159c57643ceb88279e431262282428c9e0bf3a7ef1a97e84b4}
    user: "1000:1000"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - law-eye-network
    restart: unless-stopped

  rss-fixture:
    # Avoid pulling from DockerHub in restricted environments by reusing the local web runtime image.
    image: lawsaw-web
    profiles: ["e2e"]
    command:
      [
        "node",
        "-e",
        "const http=require('http'); const fs=require('fs'); const path=require('path'); const file=path.join('/srv','rss.xml'); const server=http.createServer((req,res)=>{ if(req.url!=='/rss.xml'){res.statusCode=404; return res.end('not found');} try{ const data=fs.readFileSync(file); res.setHeader('Content-Type','application/rss+xml; charset=utf-8'); res.end(data);} catch(e){res.statusCode=500; res.end(String(e));}}); server.listen(8000,'0.0.0.0',()=>console.log('rss-fixture listening on :8000/rss.xml'));",
      ]
    volumes:
      - ./apps/web/e2e/fixtures:/srv:ro
    depends_on:
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/rss.xml"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - law-eye-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      # 使用 LAW_EYE__ 前缀匹配 config.rs 中的环境变量解析
      LAW_EYE__SERVER__HOST: "0.0.0.0"
      LAW_EYE__SERVER__PORT: "3001"
      # Local/e2e: allow localhost + docker service URLs for RSS fixtures.
      LAW_EYE__SECURITY__ALLOW_INTERNAL_SOURCE_URLS: "true"
      LAW_EYE__DATABASE__URL: postgres://law_eye:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/law_eye
      LAW_EYE__DATABASE__MAX_CONNECTIONS: "10"
      LAW_EYE__DATABASE__SESSION_ROLE: "law_eye_app"
      LAW_EYE__REDIS__URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      LAW_EYE__AI__API_KEY: ${OPENAI_API_KEY:-}
      LAW_EYE__AI__BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LAW_EYE__AI__MODEL: gpt-4o-mini
      LAW_EYE__AI__EMBEDDING_MODEL: text-embedding-3-small
      LAW_EYE__OBJECT_STORAGE__ENABLED: "true"
      LAW_EYE__OBJECT_STORAGE__ENDPOINT: "http://minio:9000"
      LAW_EYE__OBJECT_STORAGE__REGION: "us-east-1"
      LAW_EYE__OBJECT_STORAGE__BUCKET: "law-eye"
      LAW_EYE__OBJECT_STORAGE__ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      LAW_EYE__OBJECT_STORAGE__SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      LAW_EYE__OBJECT_STORAGE__FORCE_PATH_STYLE: "true"
      LAW_EYE__OBJECT_STORAGE__SSE_ENABLED: true
      RUST_LOG: info
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/law-eye-api", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - law-eye-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      LAW_EYE__SERVER__HOST: "0.0.0.0"
      LAW_EYE__SERVER__PORT: "3002"
      LAW_EYE__SECURITY__ALLOW_INTERNAL_SOURCE_URLS: "true"
      LAW_EYE__DATABASE__URL: postgres://law_eye:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/law_eye
      LAW_EYE__DATABASE__MAX_CONNECTIONS: "10"
      LAW_EYE__DATABASE__SESSION_ROLE: "law_eye_app"
      LAW_EYE__REDIS__URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      LAW_EYE__AI__API_KEY: ${OPENAI_API_KEY:-}
      LAW_EYE__AI__BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LAW_EYE__AI__MODEL: gpt-4o-mini
      LAW_EYE__AI__EMBEDDING_MODEL: text-embedding-3-small
      LAW_EYE__OBJECT_STORAGE__ENABLED: "true"
      LAW_EYE__OBJECT_STORAGE__ENDPOINT: "http://minio:9000"
      LAW_EYE__OBJECT_STORAGE__REGION: "us-east-1"
      LAW_EYE__OBJECT_STORAGE__BUCKET: "law-eye"
      LAW_EYE__OBJECT_STORAGE__ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      LAW_EYE__OBJECT_STORAGE__SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      LAW_EYE__OBJECT_STORAGE__FORCE_PATH_STYLE: "true"
      LAW_EYE__OBJECT_STORAGE__SSE_ENABLED: true
      # Browserless dynamic rendering (when crawler profile is active)
      LAW_EYE__BROWSERLESS__URL: "http://browserless:3000"
      LAW_EYE__BROWSERLESS__TIMEOUT_MS: "30000"
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/law-eye-worker", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - law-eye-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      LAW_EYE_API_PROXY_TARGET: http://api:3001
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_HOST_PORT:-8849}:8849"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8849/login',{cache:'no-store'}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - law-eye-network
    restart: unless-stopped

  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:2.4.7@sha256:b9c6ff711128fe2c422fb51ada978040ba3cc5c1fe8934af2d3f4cc5dc47069d}
    # Optional automation service. Keep behind a profile so `docker compose up`
    # remains usable in restricted networks where docker.n8n.io may be unreachable.
    profiles: ["n8n"]
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - LAW_EYE_API_URL=http://api:3001
      - EMAIL_FROM=${EMAIL_FROM:-noreply@laweye.com}
      - EMAIL_TO=${EMAIL_TO:-}
    ports:
      - "${N8N_HOST_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    depends_on:
      - api
    networks:
      - law-eye-network
    restart: unless-stopped

  browserless:
    image: ${BROWSERLESS_IMAGE:-ghcr.io/browserless/chromium:v2.24.2}
    profiles: ["crawler"]
    environment:
      MAX_CONCURRENT_SESSIONS: ${BROWSERLESS_MAX_CONCURRENT:-5}
      CONNECTION_TIMEOUT: ${BROWSERLESS_CONNECTION_TIMEOUT:-60000}
      PREBOOT_CHROME: "true"
      TOKEN: ${BROWSERLESS_TOKEN:-}
    ports:
      - "127.0.0.1:${BROWSERLESS_HOST_PORT:-3003}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/json/version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - law-eye-network
    restart: unless-stopped

networks:
  law-eye-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  minio_data:
