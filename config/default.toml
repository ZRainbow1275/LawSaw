[server]
host = "0.0.0.0"
port = 3001
allowed_origins = [
  "https://localhost",
  "https://127.0.0.1",
  "http://localhost",
  "http://127.0.0.1",
  "http://localhost:3000",
  "http://localhost:8849",
  "http://localhost:3002",
  "http://localhost:3333",
  "http://127.0.0.1:3000",
  "http://127.0.0.1:8849",
  "http://127.0.0.1:3002",
  "http://127.0.0.1:3333",
]
# Request timeout in milliseconds (0 to disable; not recommended for production).
request_timeout_ms = 30000
# Max request body size in bytes (0 to disable; not recommended for production).
max_body_bytes = 1048576

[database]
url = "postgres://law_eye:law_eye@localhost:5435/law_eye"
max_connections = 10

[redis]
url = "redis://localhost:6380"

[ai]
api_key = ""
model = "gpt-4o-mini"
embedding_model = "text-embedding-3-small"

[encryption.feedbacks]
# Enable Vault Transit encryption for sensitive feedback fields (content/contact_email).
enabled = false
vault_transit_mount = "transit"
vault_transit_key = "law-eye-feedback"

[object_storage]
# [OBJ-301] S3-compatible object storage (MinIO/AWS S3).
# Keep disabled by default; enable in enterprise compose or via env vars.
enabled = false
endpoint = "http://localhost:9000"
region = "us-east-1"
bucket = "law-eye"
access_key_id = ""
secret_access_key = ""
force_path_style = true
