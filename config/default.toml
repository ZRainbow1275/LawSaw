[server]
host = "0.0.0.0"
port = 3001
allowed_origins = [
  "https://localhost",
  "https://127.0.0.1",
  "http://localhost",
  "http://127.0.0.1",
  "http://localhost:3000",
  "http://localhost:8849",
  "http://localhost:3002",
  "http://localhost:3333",
  "http://127.0.0.1:3000",
  "http://127.0.0.1:8849",
  "http://127.0.0.1:3002",
  "http://127.0.0.1:3333",
]
# Request timeout in milliseconds (0 to disable; not recommended for production).
request_timeout_ms = 30000
# Max request body size in bytes (0 to disable; not recommended for production).
max_body_bytes = 1048576

[worker]
# Worker HTTP health endpoints for K8s probes / docker-compose checks.
health_enabled = true
health_host = "0.0.0.0"
health_port = 3002
health_check_timeout_ms = 2000

[database]
url = ""
max_connections = 10

[redis]
url = ""
pool_wait_timeout_ms = 2000
pool_create_timeout_ms = 2000
pool_recycle_timeout_ms = 2000

[rate_limit]
# Redis key prefix for fixed-window rate limits.
# Final key format: `<redis_prefix>:<scope>:<client_ip>`.
redis_prefix = "law-eye:rate-limit"
# Redis runtime failure policy:
# - true  => fail-open (allow requests when Redis is unavailable)
# - false => fail-closed (reject with HTTP 429 when Redis is unavailable)
redis_fail_open = true

[ai]
api_key = ""
model = "gpt-4o-mini"
embedding_model = "text-embedding-3-small"

[encryption.feedbacks]
# Enable Vault Transit encryption for sensitive feedback fields (content/contact_email).
enabled = false
vault_transit_mount = "transit"
vault_transit_key = "law-eye-feedback"

[object_storage]
# [OBJ-301] S3-compatible object storage (MinIO/AWS S3).
# Keep disabled by default; enable in enterprise compose or via env vars.
enabled = false
endpoint = "http://localhost:9000"
region = "us-east-1"
bucket = "law-eye"
access_key_id = ""
secret_access_key = ""
force_path_style = true
sse_enabled = true

[config_reload]
# Enable periodic hot reload for file/env configuration.
enabled = false
# Polling interval in seconds when hot reload is enabled.
interval_seconds = 30
